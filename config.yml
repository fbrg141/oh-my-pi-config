lastChangelogVersion: 13.19.0
modelRoles: 
  default: anthropic/claude-sonnet-4-6:medium
  task: openai-codex/gpt-5.4:high
  vision: openai-codex/gpt-5.4:high
  smol: openai-codex/gpt-5.4-mini:low
  commit: openai-codex/gpt-5.4-mini:low
  plan: anthropic/claude-opus-4-6:high
  slow: anthropic/claude-opus-4-6:high
cycleOrder: 
  - smol
  - default
  - plan
  - task
  - slow
theme: 
  dark: titanium
  light: light
retry: 
  maxRetries: 2
  baseDelayMs: 2000
  fallbackChains: 
    plan: 
      - openai-codex/gpt-5.4:xhigh
    default: 
      - openai-codex/gpt-5.4:high
    task: 
      - anthropic/claude-sonet-4.6:high
    smol: 
      - anthropic/claude-haiku-4-5:medium
  fallbackRevertPolicy: cooldown-expiry
compaction: 
  enabled: true
  strategy: context-full
  reserveTokens: 16384
  keepRecentTokens: 20000
  autoContinue: true
contextPromotion: 
  enabled: false
memories: 
  enabled: true
images: 
  blockImages: true
  autoResize: true
terminal: 
  showImages: true
edit: 
  blockAutoGenerated: true
  fuzzyMatch: true
  fuzzyThreshold: 0.95
lsp: 
  enabled: true
  diagnosticsOnWrite: true
  diagnosticsOnEdit: true
  formatOnWrite: false
bashInterceptor: 
  enabled: true
  patterns: 
    - pattern: ^\s*(cat|head|tail|less|more)\s+
      tool: read
      message: "Use the `read` tool instead of cat/head/tail. It provides better context and handles binary files."
    - pattern: ^\s*(grep|rg|ripgrep|ag|ack)\s+
      tool: grep
      message: "Use the `grep` tool instead of grep/rg. It respects .gitignore and provides structured output."
    - pattern: ^\s*(find|fd|locate)\s+.*(-name|-iname|-type|--type|-glob)
      tool: find
      message: "Use the `find` tool instead of find/fd. It respects .gitignore and is faster for glob patterns."
    - pattern: ^\s*sed\s+(-i|--in-place)
      tool: edit
      message: "Use the `edit` tool instead of sed -i. It provides diff preview and fuzzy matching."
    - pattern: "^\\s*perl\\s+.*-[pn]?i"
      tool: edit
      message: "Use the `edit` tool instead of perl -i. It provides diff preview and fuzzy matching."
    - pattern: ^\s*awk\s+.*-i\s+inplace
      tool: edit
      message: "Use the `edit` tool instead of awk -i inplace. It provides diff preview and fuzzy matching."
    - pattern: "^\\s*(echo|printf|cat\\s*<<)\\s+.*[^|]>\\s*\\S"
      tool: write
      message: "Use the `write` tool instead of echo/cat redirection. It handles encoding and provides confirmation."
python: 
  toolMode: both
  kernelMode: session
  sharedGateway: false
skills: 
  enabled: true
  enablePiUser: true
  enablePiProject: true
  enableCodexUser: false
  enableClaudeUser: false
  enableClaudeProject: false
  enableSkillCommands: true
  includeSkills: 
    - frontend-design
    - superpowers:brainstorming
    - superpowers:dispatching-parallel-agents
    - superpowers:subagent-driven-development
    - superpowers:writing-plans
  ignoredSkills: 
    - react-doctor
todo: 
  enabled: true
  reminders: true
todo.reminders.max: 3
marketplace: 
  autoUpdate: notify
disabledExtensions: 
  - skill:react-doctor
  - skill:superpowers:executing-plans
  - skill:superpowers:systematic-debugging
  - skill:superpowers:test-driven-development
  - skill:superpowers:verification-before-completion
  - skill:superpowers:using-superpowers
  - skill:superpowers:writing-skills
  - skill:superpowers:using-git-worktrees
  - skill:superpowers:finishing-a-development-branch
  - skill:superpowers:receiving-code-review
  - skill:superpowers:requesting-code-review
task: 
  disabledAgents: 
    []